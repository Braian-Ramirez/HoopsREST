<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoopsREST - Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="logo" style="margin-bottom: 2rem; text-align: center;">
                <h1>Hoops<span>REST</span></h1>
                <p class="subtitle">Gestión Segura de Jugadores</p>
            </div>

            <a href="/auth/google" class="google-btn">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="Google">
                Continuar con Google
            </a>

            <div class="divider"><span>O CON TU EMAIL</span></div>

            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="switchTab('login')">Ingresar</div>
                <div id="tab-register" class="auth-tab" onclick="switchTab('register')">Registrarse</div>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="primary-btn" style="width: 100%;">Entrar al Sistema</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" id="reg-name" required placeholder="Tu nombre">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-password" required placeholder="Mínimo 8 caracteres">
                </div>
                <button type="submit" class="primary-btn" style="width: 100%;">Crear Cuenta</button>
            </form>

            <a href="/" class="back-link">← Volver al Dashboard</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/auth';

        function switchTab(type) {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const tabLogin = document.getElementById('tab-login');
            const tabReg = document.getElementById('tab-register');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                tabLogin.classList.add('active');
                tabReg.classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                regForm.classList.remove('hidden');
                tabLogin.classList.remove('active');
                tabReg.classList.add('active');
            }
        }

        // Logic for Login
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.error);
                }
            } catch (err) { alert('Error al conectar con el servidor.'); }
        };

        // Logic for Register
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('¡Cuenta creada! Ahora puedes iniciar sesión.');
                    switchTab('login');
                } else {
                    alert(data.error);
                }
            } catch (err) { alert('Error al conectar con el servidor.'); }
        };
    </script>
</body>
</html>
